<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoundTouch Radio Bridge</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #86868b;
    --divider: #d2d2d7;
    --divider-soft: #e5e5e7;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0, 113, 227, 0.1);
    --danger: #ff3b30;
    --success: #34c759;
    --success-soft: rgba(52, 199, 89, 0.1);
    --warning: #ff9500;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12), 0 4px 8px rgba(0, 0, 0, 0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    line-height: 1.47;
  }

  .container { max-width: 760px; margin: 0 auto; padding: 32px 20px 64px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 0 4px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.022em;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 11px;
    border-radius: 980px;
    transition: all 200ms ease;
  }
  .badge::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .badge.online {
    color: var(--success);
    background: var(--success-soft);
  }
  .badge.online::before { background: var(--success); }
  .badge.offline {
    color: var(--danger);
    background: rgba(255, 59, 48, 0.1);
  }
  .badge.offline::before { background: var(--danger); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 980px;
    background: transparent;
    color: var(--text-secondary);
    border: none;
    text-decoration: none;
    padding: 0;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .icon-btn svg {
    width: 24px;
    height: 24px;
    display: block;
  }
  .icon-btn:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .icon-btn:active {
    transform: scale(0.96);
  }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-header {
    padding: 18px 22px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-tertiary);
  }
  .card-body { padding: 4px 22px 18px; }
  .card-body.tight { padding: 0; }

  /* Now Playing */
  .now-playing {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 22px;
  }
  .np-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .np-icon.idle { background: rgba(0, 0, 0, 0.04); color: var(--text-tertiary); }
  .np-info { flex: 1; min-width: 0; }
  .np-status {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }
  .np-status.live { color: var(--success); }
  .np-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .np-name.empty { color: var(--text-secondary); font-weight: 400; }

  /* Preset grid */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 4px 22px 22px;
  }
  .preset-btn {
    aspect-ratio: 1.6;
    background: var(--card);
    border: 1px solid var(--divider-soft);
    border-radius: 14px;
    padding: 12px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 120ms ease;
    -webkit-appearance: none;
    font-family: inherit;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .preset-btn:active { transform: scale(0.97); }
  .preset-btn.active {
    border: 2px solid var(--success);
    background: var(--success-soft);
    padding: 11px 9px;
  }
  .preset-btn.empty {
    border-style: dashed;
    background: rgba(0, 0, 0, 0.015);
  }
  .preset-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
  }
  .preset-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .preset-btn.active .preset-num { color: var(--success); }
  .preset-empty-label {
    font-size: 13px;
    color: var(--text-tertiary);
    font-weight: 400;
  }

  /* Station list */
  .station-list { display: flex; flex-direction: column; }
  .station-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    border-top: 1px solid var(--divider-soft);
    transition: background 120ms ease;
  }
  .station-row:first-of-type { border-top: none; }
  .station-row:hover { background: rgba(0, 0, 0, 0.02); }
  .station-row.playing { background: var(--success-soft); }
  .station-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .station-row.playing .station-icon {
    background: rgba(52, 199, 89, 0.15);
    color: var(--success);
  }
  .station-info { flex: 1; min-width: 0; }
  .station-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .station-preset {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    margin-top: 1px;
  }
  .empty-state {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 14px;
    padding: 26px 22px;
  }

  /* Forms */
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .input,
  textarea.input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--divider);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    transition: border-color 120ms ease, box-shadow 120ms ease;
    -webkit-appearance: none;
  }
  .input:focus, textarea.input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
  }
  .field-help {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .add-row { display: flex; gap: 8px; }
  .add-row .input { flex: 1; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    border: none;
    border-radius: 980px;
    cursor: pointer;
    transition: all 100ms ease;
    -webkit-appearance: none;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: rgba(0, 0, 0, 0.06); color: var(--text); }
  .btn-secondary:hover { background: rgba(0, 0, 0, 0.1); }
  .btn-ghost { background: transparent; color: var(--accent); }
  .btn-ghost:hover { background: var(--accent-soft); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); }
  .btn-danger:hover { background: rgba(255, 59, 48, 0.1); }
  .btn-play { background: var(--success); color: white; padding: 7px 12px; }
  .btn-play:hover { background: #2bb14f; }
  .btn-stop { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
  .btn-stop:hover { background: rgba(255, 59, 48, 0.18); }
  .btn-menu {
    background: transparent;
    color: var(--text-tertiary);
    font-size: 18px;
    padding: 4px 10px;
    line-height: 1;
  }
  .btn-menu:hover { background: rgba(0, 0, 0, 0.06); color: var(--text); }
  .btn-icon {
    padding: 7px 11px;
    font-size: 14px;
  }
  .btn-large { padding: 10px 20px; font-size: 14px; }

  /* Pending add tray + search results */
  .pending-add {
    margin-top: 12px;
    background: var(--accent-soft);
    border-radius: 12px;
    padding: 14px;
  }
  .pending-add-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .pending-add-row { display: flex; gap: 8px; align-items: center; }
  .pending-add input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--divider);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
  }
  .pending-add input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
  }
  .pending-add-url {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 8px;
    word-break: break-all;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  .search-results {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 380px;
    overflow-y: auto;
  }
  .search-result {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--divider-soft);
    border-radius: 10px;
    padding: 10px 12px;
    transition: all 120ms ease;
  }
  .search-result:hover { border-color: var(--accent); }
  .search-result-icon {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .search-result-name {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Station action menu */
  .menu-popover {
    position: absolute;
    background: var(--card);
    border-radius: 12px;
    padding: 6px;
    box-shadow: var(--shadow-lg);
    z-index: 50;
    min-width: 200px;
    border: 1px solid var(--divider-soft);
  }
  .menu-item {
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    border-radius: 7px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .menu-item:hover { background: rgba(0, 0, 0, 0.05); }
  .menu-item.danger { color: var(--danger); }
  .menu-item.danger:hover { background: rgba(255, 59, 48, 0.08); }
  .menu-divider { height: 1px; background: var(--divider-soft); margin: 4px 0; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 18px;
    width: 100%;
    max-width: 440px;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modal-in 200ms cubic-bezier(0.2, 0.9, 0.3, 1);
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 22px 22px 8px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: var(--text);
  }
  .modal-body { padding: 8px 22px 18px; }

  .current-assignment {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--success-soft);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .current-assignment .icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(52, 199, 89, 0.18);
    color: var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .current-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--success);
    font-weight: 600;
  }
  .current-name {
    font-size: 16px;
    font-weight: 500;
    margin-top: 2px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .modal-actions .btn { flex: 1; padding: 10px 16px; font-size: 14px; }
  .modal-replace-note {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .modal-replace-note strong { color: var(--text); font-weight: 600; }

  .picker-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .picker-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--divider-soft);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 120ms ease;
  }
  .picker-item:hover { border-color: var(--accent); }
  .picker-item.selected {
    border: 2px solid var(--accent);
    background: var(--accent-soft);
    padding: 9px 11px;
  }
  .picker-item-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .picker-item-name { flex: 1; font-size: 14px; font-weight: 500; }
  .picker-item-preset {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }
  .check { color: var(--accent); font-size: 16px; font-weight: 600; }
  .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Small screens */
  @media (max-width: 540px) {
    .container { padding: 20px 14px 48px; }
    .header h1 { font-size: 24px; }
    .preset-btn { aspect-ratio: 1.4; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>SoundTouch Radio</h1>
    <span id="badge" class="badge offline">Offline</span>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Now Playing</span>
      <a href="/settings" aria-label="Speaker settings" class="icon-btn" title="Speaker settings"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></a>
    </div>
    <div class="now-playing">
      <div id="np-icon" class="np-icon idle">📻</div>
      <div class="np-info">
        <div id="np-status" class="np-status">Idle</div>
        <div id="np-name" class="np-name empty">Nothing playing</div>
      </div>
      <button class="btn btn-stop" id="btn-stop" style="display:none" onclick="stopPlayback()">Stop</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Presets</span>
      <button class="icon-btn" id="manage-profiles-btn" aria-label="Manage station profiles" title="Manage station profiles" type="button"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
    </div>
    <div class="preset-grid" id="preset-grid"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Stations</span>
      <button class="btn btn-ghost" onclick="focusAddInput()">+ Add</button>
    </div>
    <div class="card-body tight" id="station-list"></div>
  </div>

  <div class="card" id="add-section">
    <div class="card-header"><span class="card-title">Add Station</span></div>
    <div class="card-body">
      <div class="add-row">
        <input class="input" id="add-input" placeholder="Paste a stream URL or search TuneIn…" onkeydown="if(event.key==='Enter')handleAddInput()">
        <button class="btn btn-ghost btn-large" onclick="handleAddInput()">Go</button>
      </div>
      <div class="field-help">Paste an MP3/AAC/HLS URL to add directly, or type a station name to search TuneIn.</div>
      <div id="pending-add" class="pending-add" style="display:none"></div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header" id="modal-title">Preset</div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let stations = [];
let presets = {};
let nowPlayingStationId = null;
let modalSlot = null;
let modalMode = 'view';
let pickerSelected = null;

async function fetchAll() {
  try {
    const [stRes, prRes, stRes2] = await Promise.all([
      fetch('/api/stations'),
      fetch('/api/presets'),
      fetch('/api/status'),
    ]);
    stations = await stRes.json();
    presets = await prRes.json();
    const status = await stRes2.json();
    updateBadge(status.online);
    updateNowPlaying(status.nowPlaying);
    renderPresets();
    renderStations();
  } catch(e) {
    updateBadge(false);
  }
}

function updateBadge(online) {
  const b = document.getElementById('badge');
  b.textContent = online ? 'Online' : 'Offline';
  b.className = 'badge ' + (online ? 'online' : 'offline');
}

function updateNowPlaying(np) {
  const icon = document.getElementById('np-icon');
  const status = document.getElementById('np-status');
  const name = document.getElementById('np-name');
  const stopBtn = document.getElementById('btn-stop');
  if (np) {
    icon.className = 'np-icon';
    status.textContent = 'Now Playing';
    status.className = 'np-status live';
    name.textContent = np;
    name.className = 'np-name';
    stopBtn.style.display = '';
  } else {
    icon.className = 'np-icon idle';
    status.textContent = 'Idle';
    status.className = 'np-status';
    name.textContent = 'Nothing playing';
    name.className = 'np-name empty';
    stopBtn.style.display = 'none';
  }
}

function renderPresets() {
  const grid = document.getElementById('preset-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const sid = presets[i] || presets[String(i)];
    const st = sid ? stations.find(s => s.id === sid) : null;
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (st ? '' : ' empty') + (sid && sid === nowPlayingStationId ? ' active' : '');
    btn.innerHTML = `<div class="preset-num">${i}</div>` +
      (st
        ? `<div class="preset-name">${escapeHTML(st.name)}</div>`
        : `<div class="preset-empty-label">+ assign</div>`);
    btn.onclick = () => openPresetModal(i);
    grid.appendChild(btn);
  }
}

function renderStations() {
  const list = document.getElementById('station-list');
  list.innerHTML = '';
  if (stations.length === 0) {
    list.innerHTML = '<div class="empty-state">No stations yet. Add one below.</div>';
    return;
  }
  stations.forEach(st => {
    const assignedSlots = Object.entries(presets)
      .filter(([,sid]) => sid === st.id)
      .map(([slot]) => `Preset ${slot}`)
      .join(', ');
    const row = document.createElement('div');
    row.className = 'station-row' + (st.id === nowPlayingStationId ? ' playing' : '');
    row.innerHTML = `
      <div class="station-icon">📻</div>
      <div class="station-info">
        <div class="station-name">${escapeHTML(st.name)}</div>
        ${assignedSlots ? `<div class="station-preset">${escapeHTML(assignedSlots)}</div>` : ''}
      </div>
      <button class="btn btn-play btn-icon" onclick="playStation('${st.id}')">▶</button>
      <button class="btn btn-menu" onclick="openStationMenu(event,'${st.id}')">⋯</button>
    `;
    list.appendChild(row);
  });
}

async function playStation(id) {
  await fetch('/api/play', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({stationId: id})});
  nowPlayingStationId = id;
  renderStations();
  renderPresets();
}

async function stopPlayback() {
  await fetch('/api/play', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({stationId: ''})});
  nowPlayingStationId = null;
  updateNowPlaying(null);
  renderStations();
}

function openStationMenu(e, stationId) {
  e.stopPropagation();
  closeStationMenu();
  const st = stations.find(s => s.id === stationId);
  if (!st) return;
  const menu = document.createElement('div');
  menu.className = 'menu-popover';
  menu.id = 'station-menu';
  const presetButtons = [1,2,3,4,5,6].map(n => {
    const assigned = (presets[n] === st.id) ? ' ✓' : '';
    return `<div class="menu-item" onclick="quickAssignPreset(${n}, '${st.id}')">Assign to preset ${n}${assigned}</div>`;
  }).join('');
  menu.innerHTML = `
    <div class="menu-item" onclick="playStation('${st.id}');closeStationMenu()">▶ Play now</div>
    <div class="menu-divider"></div>
    ${presetButtons}
    <div class="menu-divider"></div>
    <div class="menu-item danger" onclick="confirmDelete('${st.id}', '${escapeAttr(st.name)}')">Delete</div>
  `;
  document.body.appendChild(menu);
  const rect = e.target.getBoundingClientRect();
  menu.style.top = (window.scrollY + rect.bottom + 6) + 'px';
  menu.style.right = (window.innerWidth - rect.right) + 'px';
  setTimeout(() => document.addEventListener('click', closeStationMenu, { once: true }), 0);
}

function closeStationMenu() {
  const m = document.getElementById('station-menu');
  if (m) m.remove();
}

async function quickAssignPreset(slot, stationId) {
  await fetch('/api/presets', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({slot, stationId}),
  });
  closeStationMenu();
  await fetchAll();
}

async function confirmDelete(id, name) {
  closeStationMenu();
  if (!confirm(`Delete "${name}"?`)) return;
  await fetch('/api/stations/' + id, {method:'DELETE'});
  await fetchAll();
}

function openPresetModal(slot) {
  modalSlot = slot;
  pickerSelected = null;
  const sid = presets[slot] || presets[String(slot)];
  const st = sid ? stations.find(s => s.id === sid) : null;
  if (st) {
    modalMode = 'view';
    showViewModal(slot, st);
  } else {
    modalMode = 'pick';
    showPickerModal(slot, null);
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function showViewModal(slot, st) {
  document.getElementById('modal-title').textContent = `Preset ${slot}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="current-assignment">
      <div class="icon">📻</div>
      <div>
        <div class="current-label">Currently assigned</div>
        <div class="current-name">${escapeHTML(st.name)}</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-play" onclick="playStation('${st.id}');closeModalForce()">▶ Play now</button>
      <button class="btn btn-secondary" onclick="showPickerModal(${slot}, '${st.id}')">Change…</button>
    </div>
  `;
}

function showPickerModal(slot, currentId) {
  modalMode = 'pick';
  pickerSelected = null;
  const currentSt = currentId ? stations.find(s => s.id === currentId) : null;
  document.getElementById('modal-title').textContent = currentSt
    ? `Preset ${slot} — Change station`
    : `Preset ${slot} — Assign station`;

  const itemsHTML = stations.map(st => {
    const assignedSlots = Object.entries(presets)
      .filter(([,sid]) => sid === st.id)
      .map(([s]) => `Preset ${s}`)
      .join(', ');
    return `<div class="picker-item" data-id="${st.id}" onclick="selectPickerItem(this,'${st.id}')">
      <div class="picker-item-icon">📻</div>
      <div class="picker-item-name">${escapeHTML(st.name)}</div>
      ${assignedSlots ? `<div class="picker-item-preset">${escapeHTML(assignedSlots)}</div>` : ''}
      <div class="check" style="display:none">✓</div>
    </div>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `
    ${currentSt ? `<div class="modal-replace-note">Replace <strong>${escapeHTML(currentSt.name)}</strong>:</div>` : ''}
    <div class="picker-list">${itemsHTML || '<div class="empty-state">No stations in library. Add one first.</div>'}</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModalForce()">Cancel</button>
      <button class="btn btn-primary btn-confirm" id="btn-confirm" disabled onclick="confirmAssign()">Assign</button>
    </div>
  `;
}

function selectPickerItem(el, id) {
  document.querySelectorAll('.picker-item').forEach(i => {
    i.classList.remove('selected');
    i.querySelector('.check').style.display = 'none';
  });
  el.classList.add('selected');
  el.querySelector('.check').style.display = '';
  pickerSelected = id;
  const st = stations.find(s => s.id === id);
  const btn = document.getElementById('btn-confirm');
  btn.disabled = false;
  btn.textContent = `Assign ${st ? st.name : ''}`;
}

async function confirmAssign() {
  if (!pickerSelected || !modalSlot) return;
  await fetch('/api/presets', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({slot: modalSlot, stationId: pickerSelected})
  });
  closeModalForce();
  await fetchAll();
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modal-overlay')) return;
  closeModalForce();
}

function closeModalForce() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalSlot = null;
  pickerSelected = null;
}

function focusAddInput() {
  const el = document.getElementById('add-input');
  document.getElementById('add-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => el.focus({ preventScroll: true }), 350);
}

async function handleAddInput() {
  const input = document.getElementById('add-input').value.trim();
  if (!input) return;
  if (input.startsWith('http://') || input.startsWith('https://')) {
    let defaultName = '';
    try { defaultName = new URL(input).hostname; } catch(e) { defaultName = ''; }
    showPendingAdd(defaultName, input, '');
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  const res = await fetch('/api/search?q=' + encodeURIComponent(input));
  if (!res.ok) {
    alert('Search failed. Try pasting a direct stream URL instead.');
    return;
  }
  const results = await res.json();
  const container = document.getElementById('search-results');
  container.innerHTML = '';
  document.getElementById('pending-add').style.display = 'none';
  if (!results || results.length === 0) {
    container.innerHTML = '<div class="empty-state">No results. Try a direct URL.</div>';
    return;
  }
  results.forEach(r => {
    const name = r.name || '';
    const url = r.url || '';
    const logo = r.logo || '';
    const el = document.createElement('div');
    el.className = 'search-result';
    el.innerHTML = `
      <div class="search-result-icon">📻</div>
      <div class="search-result-name">${escapeHTML(name)}</div>
      <button class="btn btn-primary">Add</button>
    `;
    el.querySelector('button').onclick = () => {
      showPendingAdd(name, url, logo);
      container.innerHTML = '';
    };
    container.appendChild(el);
  });
}

function showPendingAdd(name, url, logo) {
  const tray = document.getElementById('pending-add');
  tray.style.display = '';
  tray.innerHTML = `
    <div class="pending-add-label">Name this station</div>
    <div class="pending-add-row">
      <input type="text" id="pending-name" value="${escapeAttr(name)}" placeholder="Station name" onkeydown="if(event.key==='Enter')confirmPendingAdd('${escapeAttr(url)}','${escapeAttr(logo)}')">
      <button class="btn btn-primary" onclick="confirmPendingAdd('${escapeAttr(url)}','${escapeAttr(logo)}')">Add</button>
      <button class="btn btn-secondary" onclick="cancelPendingAdd()">Cancel</button>
    </div>
    <div class="pending-add-url">${escapeHTML(url)}</div>
  `;
  setTimeout(() => document.getElementById('pending-name').focus(), 0);
}

async function confirmPendingAdd(url, logo) {
  const name = document.getElementById('pending-name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  await fetch('/api/stations', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, url, logo}),
  });
  cancelPendingAdd();
  document.getElementById('add-input').value = '';
  await fetchAll();
}

function cancelPendingAdd() {
  document.getElementById('pending-add').style.display = 'none';
  document.getElementById('pending-add').innerHTML = '';
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  return String(s).replace(/['"\\]/g, c => '\\' + c);
}

fetchAll();
setInterval(fetchAll, 3000);
</script>
</body>
</html>
